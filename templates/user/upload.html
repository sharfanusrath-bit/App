<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>A Secure Storage Model With Authentication and Optimal Key Generation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    body, html {
      height: 100%;
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: url('{% static "img/bg1.jpg" %}') no-repeat center center fixed;
      background-size: cover;
    }

    .navbar {
      background-color: rgba(0, 0, 0, 0.8);
    }

    .navbar-brand h1 {
      font-size: 1.5rem;
      color: #fff;
      margin: 0;
    }

    .nav-link {
      color: #fff !important;
    }

    .form-section {
      background-color: rgba(255, 255, 255, 0.85);
      border-radius: 15px;
      padding: 30px;
      margin-top: 100px;
    }

    h2 {
      color: #333;
    }

    .btn-upload {
      background-color: #ef6603;
      color: white;
      padding: 10px 25px;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      transition: all 0.3s ease-in-out;
    }

    .btn-upload:hover {
      background-color: #d35400;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">
        <h1>A Secure Storage Model With Authentication and Optimal Key Generation</h1>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="{% url 'userhome' %}">Profile</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="{% url 'upload_evidence' %}">Upload Evidence</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{% url 'my_evidences' %}">Evidence's</a>
              </li>
  
            <li class="nav-item">
              <a class="nav-link" href="{% url 'user_logout' %}">Logout</a>
            </li>
          </ul>
      </div>
    </div>
  </nav>
<br><br>
<br>  <!-- Upload Form Section -->
  <main class="container">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="form-section mt-5">
          <h2 class="text-center mb-4">Upload Evidence</h2>
          <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
              <label for="file" class="form-label fw-bold">Choose Evidence File</label>
              <input type="file" name="file" id="file" class="form-control" required>
            </div>
            <div class="text-center">
              <button type="submit" class="btn btn-upload">
                <i class="fas fa-upload"></i> Submit
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>

</body>
</html>
